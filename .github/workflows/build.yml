name: Build APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          log-accepted-android-sdk-licenses: false
          packages: 'platforms;android-36 build-tools;36.0.0 platform-tools'

      - name: Install NDK
        run: |
          SDKMANAGER=$(find $ANDROID_HOME/cmdline-tools -maxdepth 3 -name sdkmanager -type f | head -n1)
          echo "y" | "$SDKMANAGER" \
            --channel=0 \
            --install "ndk;29.0.14206865"
          echo "NDK_HOME=$ANDROID_HOME/ndk/29.0.14206865" >> $GITHUB_ENV
          sed -i '/compileSdk = 36/i\    ndkVersion = "29.0.14206865"' ${{ github.workspace }}/V2rayNG/app/build.gradle.kts

      - name: Build libhevtun (native tunnel library)
        run: bash compile-hevtun.sh

      - name: Copy libhevtun into app module
        run: cp -r ${{ github.workspace }}/libs ${{ github.workspace }}/V2rayNG/app

      - name: Download libv2ray.aar (Xray core)
        uses: robinraju/release-downloader@v1.13
        with:
          repository: '2dust/AndroidLibXrayLite'
          tag: 'v26.5.9'
          fileName: 'libv2ray.aar'
          out-file-path: V2rayNG/app/libs/

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Build debug APK
        run: |
          cd ${{ github.workspace }}/V2rayNG
          echo "sdk.dir=${ANDROID_HOME}" > local.properties
          chmod 755 gradlew
          ./gradlew assemblePlaystoreDebug --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: m-debug-apk
          path: V2rayNG/app/build/outputs/apk/**/*.apk

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: build-${{ github.run_number }}
          name: m build #${{ github.run_number }}
          body: Automated debug build from commit ${{ github.sha }}
          files: V2rayNG/app/build/outputs/apk/**/*.apk
